name: "Criticality Score"
on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - 'projects/**/project.yaml'

permissions:
  pull-requests: write
  contents: read

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run criticality scorer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 tools/criticality/score.py --pr "${{ github.event.number }}"
